{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Uniform Inventory</title>
    <link rel="stylesheet" href="{% static 'inventory/css/login.css' %}">
    <link rel="icon" type="image/x-icon" href="{% static 'inventory/images/school-logo.jpg' %}">
</head>
<body>
    <div class="login-container">
        <!-- Logo -->
        <img src="{% static 'inventory/images/school-logo.png' %}" alt="School Logo" class="logo">

        <!-- Login Form -->
        <h2>Login</h2>
        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        {% if messages %}
            {% for message in messages %}
                <p class="message">{{ message }}</p>
            {% endfor %}
        {% endif %}

        {% if form.errors %}
            <p class="error">⚠️ Please enter a correct username and password.</p>
        {% endif %}

        <p>Don't have an account? <a href="{% url 'register' %}">Register here</a></p>
    </div>
</body>
</html>
